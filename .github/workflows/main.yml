name: Global Stock Downloader

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # 赋予 Action 权限，让它能把进度文件 (.csv) 推送回你的仓库
    permissions:
      contents: write 
      
    env:
      LP_APP_KEY: ${{ secrets.LP_APP_KEY }}
      LP_APP_SECRET: ${{ secrets.LP_APP_SECRET }}
      LP_ACCESS_TOKEN: ${{ secrets.LP_ACCESS_TOKEN }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install
      run: pip install pandas tqdm longport pyarrow

    - name: Run Step 1 (Build List)
      run: python step1_build_top1000.py

    - name: Run Step 2 (Download OHLCV)
      run: python step2_download_ohlcv.py

    - name: Save progress even on failure
      if: always() # 无论成功还是超时，都执行存档
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 存档缓存文件、最终名单以及已下载的部分行情
        git add step1_progress_cache.csv top1000_by_year.csv failed_symbols.txt || true
        git commit -m "自动存档下载进度 [skip ci]" || exit 0
        git push
