name: 下载美股每年前1000只

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install longbridge pandas tqdm

      - name: 下载数据（断点续传）
        env:
          LB_APP_KEY: ${{ secrets.LB_APP_KEY }}
          LB_APP_SECRET: ${{ secrets.LB_APP_SECRET }}
          LB_ACCESS_TOKEN: ${{ secrets.LB_ACCESS_TOKEN }}
        run: python step2_download_ohlcv.py

      - name: 打包全部数据
        uses: actions/upload-artifact@v4
        with:
          name: us_1000_turnover_data
          path: us_1000_turnover/
