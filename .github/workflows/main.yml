name: 下载美股每年前1000只
on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装旧版长桥
        run: |
          pip install --upgrade pip
          pip install "longbridge<3.0.0" pandas tqdm

      - name: 运行 Step1 生成股票名单
        env:
          LP_APP_KEY: ${{ secrets.LP_APP_KEY }}
          LP_APP_SECRET: ${{ secrets.LP_APP_SECRET }}
          LP_ACCESS_TOKEN: ${{ secrets.LP_ACCESS_TOKEN }}
        run: python step1_build_top1000.py

      - name: 运行 Step2 下载行情
        env:
          LP_APP_KEY: ${{ secrets.LP_APP_KEY }}
          LP_APP_SECRET: ${{ secrets.LP_APP_SECRET }}
          LP_ACCESS_TOKEN: ${{ secrets.LP_ACCESS_TOKEN }}
        run: python step2_download_ohlcv.py

      - name: 打包下载
        uses: actions/upload-artifact@v4
        with:
          name: us_1000_turnover_data
          path: us_1000_turnover/
